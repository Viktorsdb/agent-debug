name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]" 2>/dev/null || pip install -e ".[dev]" 2>/dev/null || pip install -e . pytest pytest-asyncio pytest-mock

      - name: Run tests (adapters only, no API key needed)
        run: pytest tests/test_adapters/ tests/test_agents/ -v
